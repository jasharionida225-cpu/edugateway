<section>

    <h1 data-i18n="About EduGateway"></h1>

    <p data-i18n="EduGateway is a platform created to help high school students in Kosovo discover scholarships, programs, and other opportunities around the world."></p>

    <p data-i18n="Many talented students miss life-changing opportunities simply because they don't hear about them. EduGateway brings them all together in one place, making it easier to find the right opportunities."></p>

    <h2 data-i18n="About the Creator"></h2>

    <p data-i18n="My name is Onida, and I am a high school student from Kosovo. I built this website entirely on my own with the goal of helping my peers access opportunities that I wish had been easier to find when I was searching."></p>

    <p data-i18n="As a student passionate about education and technology, I wanted to create a space where students could explore scholarships, programs, and extracurricular opportunities without barriers."></p>

    <p data-i18n="EduGateway is my way of giving back to the student community in Kosovo, empowering others to take part in programs that can change their academic and personal lives."></p>

    <h2 data-i18n="My Mission"></h2>

    <p data-i18n="To collect, organize, and share educational opportunities for students in Kosovo and beyond, helping them discover pathways to growth, leadership, and global learning."></p>

    <div style="margin-top: 40px; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h3 style="margin-bottom: 15px;" data-i18n="Get in Touch"></h3>
        <p style="margin-bottom: 15px;" data-i18n="Have questions, suggestions, or want to contribute opportunities? Feel free to reach out!"></p>
        <a href="mailto:contact@edugateway.com" class="btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
            <span data-i18n="Contact Us"></span>
        </a>
    </div>

</section>
