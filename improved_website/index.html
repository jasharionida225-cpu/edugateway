<!DOCTYPE html>
<html lang="sq">

<head>
    <meta charset="UTF-8">

</head>

<body data-i18n-page-title="EduGateway - Global Opportunities for Students">

<!-- ========== NAVBAR ========== -->
<nav class="navbar">
    <a href="index.html" class="logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2v-5"/>
            </svg>
        </div>
        <span data-i18n="EduGateway"></span>
    </a>

    <button class="mobile-menu-btn" id="mobileMenuBtn" data-i18n-aria="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="search-area" id="searchArea">
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="Search opportunities" placeholder="">
            <button class="search-clear" id="clearSearch" data-i18n-aria="Clear search">&times;</button>
        </div>
        <div class="filter-group">
            <select id="typeFilter" class="filter-select">
                <option value="all" data-i18n="All Types"></option>
                <option value="scholarship" data-i18n="Scholarships"></option>
                <option value="program" data-i18n="Programs"></option>
                <option value="other" data-i18n="Other"></option>
            </select>
            <select id="countryFilter" class="filter-select">
                <option value="all" data-i18n="All Countries"></option>
                <option value="usa" data-i18n="USA"></option>
                <option value="germany" data-i18n="Germany"></option>
                <option value="uk" data-i18n="United Kingdom"></option>
                <option value="france" data-i18n="France"></option>
                <option value="europe" data-i18n="Europe"></option>
                <option value="kosovo" data-i18n="Kosovo"></option>
                <option value="international" data-i18n="International"></option>
            </select>
        </div>
    </div>

    <div class="nav-links" id="navLinks">
        <a href="index.html" data-i18n="Home"></a>
        <a href="scholarships.html" data-i18n="Scholarships"></a>
        <a href="programs.html" data-i18n="Programs"></a>
        <a href="other.html" data-i18n="Other"></a>
        <a href="about.html" data-i18n="About"></a>
    </div>

    <select id="languageSelect" class="language-select">
        <option value="sq" data-i18n="Shqip"></option>
        <option value="en" data-i18n="English"></option>
    </select>
</nav>

<!-- ========== HERO SECTION ========== -->
<section class="hero">
    <h1 data-i18n="Unlock Global Opportunities for Students Everywhere"></h1>
    <p data-i18n="EduGateway helps high school students from Kosovo and around the world find scholarships, programs, internships, and other educational opportunities."></p>
    <p data-i18n="Many talented students miss life-changing opportunities simply because they never hear about them. EduGateway brings them together in one place so you can easily explore and apply."></p>

    <div class="hero-buttons">
        <a href="scholarships.html" class="btn" data-i18n="Explore Scholarships"></a>
        <a href="programs.html" class="btn btn-outline" data-i18n="Discover Programs"></a>
    </div>
</section>

<!-- ========== START HERE ========== -->
<section class="section-alt">
    <div class="container">
        <div class="section-header">
            <h2 data-i18n="Start Here"></h2>
            <p data-i18n="A simple guide to help you find the right opportunity fast."></p>
        </div>

        <div class="steps-grid">
            <div class="step-card">
                <div class="step-number">1</div>
                <h3 data-i18n="Pick a category"></h3>
                <p data-i18n="Start with Scholarships, Programs, or Other and use filters."></p>
            </div>
            <div class="step-card">
                <div class="step-number">2</div>
                <h3 data-i18n="Check requirements"></h3>
                <p data-i18n="Look at age, deadline, and what is covered (tuition, travel, stipend)."></p>
            </div>
            <div class="step-card">
                <div class="step-number">3</div>
                <h3 data-i18n="Apply early"></h3>
                <p data-i18n="Save links, prepare documents, and apply before the deadline."></p>
            </div>
        </div>
    </div>
</section>

<!-- ========== TOP PICKS ========== -->
<section>
    <div class="container">
        <div class="section-header">
            <h2 data-i18n="Top Picks"></h2>
            <p data-i18n="Popular options many Kosovo students are interested in."></p>
        </div>

        <div class="search-info" id="searchInfo">
            <div class="results-count" id="resultsCount"></div>
            <div class="active-filters" id="activeFilters"></div>
            <button class="suggestion-btn hidden" id="clearAllFilters" onclick="clearAllFilters()" style="display: none;">
                <span data-i18n="Clear all filters"></span>
            </button>
        </div>

        <div class="no-results" id="noResults">
            <div class="no-results-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    <line x1="8" y1="8" x2="14" y2="14"/>
                    <line x1="14" y1="8" x2="8" y2="14"/>
                </svg>
            </div>
            <h3 id="noResultsTitle" data-i18n="No results found"></h3>
            <p id="noResultsText" data-i18n="Try adjusting your filters or search terms"></p>
            <div class="no-results-suggestions">
                <button class="suggestion-btn" onclick="clearAllFilters()" data-i18n="Clear all filters"></button>
                <button class="suggestion-btn" onclick="clearSearchFilter()" data-i18n="Try a broader search"></button>
                <button class="suggestion-btn" onclick="clearTypeFilter()" data-i18n="Remove filters"></button>
            </div>
        </div>

        <div class="card-container">
            <div class="card" data-type="scholarship" data-country="kosovo">
                <div class="card-header">
                    <h3 data-i18n="United World Colleges (UWC)"></h3>
                    <span class="card-country">🇽🇰</span>
                </div>
                <span class="card-type scholarship" data-i18n="Scholarship"></span>
                <p data-i18n="UWC is a global network of international boarding schools where students from more than 150 countries study together and complete the International Baccalaureate (IB) diploma.|Key details:|Age: 16–18|Duration: 2 years|Scholarship: many students receive full funding covering tuition and living costs|Kosovo students apply through the national UWC committee."></p>
                <button data-i18n="Visit Website" onclick="window.open('https://apply.uwc.org/')"></button>
            </div>

            <div class="card" data-type="program" data-country="usa">
                <div class="card-header">
                    <h3 data-i18n="Youth Exchange and Study Program (YES)"></h3>
                    <span class="card-country">🇺🇸</span>
                </div>
                <span class="card-type program" data-i18n="Program"></span>
                <p data-i18n="The YES program is a fully funded exchange program supported by the U.S. Department of State that allows students from countries with significant Muslim populations, including Kosovo, to study in an American high school for one year.|Key details:|Age: usually 15–17 years old|Duration: 1 academic year|Coverage: flights, tuition, housing with host family, insurance, and stipend"></p>
                <button data-i18n="Visit Website" onclick="window.open('https://exchanges.state.gov/non-us/program/kennedy-lugar-youth-exchange-study-yes')"></button>
            </div>

            <div class="card" data-type="other" data-country="usa">
                <div class="card-header">
                    <h3 data-i18n="USA College Scholarships &amp; Guide"></h3>
                    <span class="card-country">🇺🇸</span>
                </div>
                <span class="card-type other" data-i18n="Guide"></span>
                <p data-i18n="A dedicated section for students who want to study in the United States.|Includes:|Full scholarships|Application guides|SAT/TOEFL info|Tips for Kosovo students"></p>
                <button data-i18n="Open Section" onclick="window.location.href='usa.html'"></button>
            </div>
        </div>
    </div>
</section>

<!-- ========== FEATURES SECTION ========== -->
<section class="features">
    <div class="container">
        <div class="section-header">
            <h2 data-i18n="Explore by category"></h2>
            <p data-i18n="Everything is organized so you can find opportunities quickly."></p>
        </div>

        <div class="home-grid">
            <div>
                <div class="feature-card">
                    <h3 data-i18n="Scholarships"></h3>
                    <p data-i18n="Find fully funded opportunities from around the globe that can support your education."></p>
                    <div class="mt-20">
                        <a class="btn" href="scholarships.html" data-i18n="Explore Scholarships"></a>
                    </div>
                </div>

                <div class="feature-card">
                    <h3 data-i18n="Programs"></h3>
                    <p data-i18n="Explore summer programs, leadership initiatives, and research experiences."></p>
                    <div class="mt-20">
                        <a class="btn" href="programs.html" data-i18n="Discover Programs"></a>
                    </div>
                </div>
            </div>

            <div>
                <div class="feature-card">
                    <h3 data-i18n="Other Opportunities"></h3>
                    <p data-i18n="Competitions, fellowships, volunteering, internships, and online courses."></p>
                    <div class="mt-20">
                        <a class="btn" href="other.html" data-i18n="See All Opportunities"></a>
                    </div>
                </div>

                <div class="feature-card">
                    <h3 data-i18n="Our Mission"></h3>
                    <p data-i18n="To empower students from Kosovo and beyond to find scholarships, programs, and experiences that help them succeed academically, personally, and professionally."></p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ========== CTA SECTION ========== -->
<section class="cta">
    <h2 data-i18n="Start Exploring Opportunities Today"></h2>
    <p data-i18n="Whether you are looking for a scholarship, a summer program, or a volunteering opportunity in Kosovo or abroad, EduGateway has curated them for you in one place."></p>
</section>

<!-- ========== NOTIFICATIONS (collapsible tray) ========== -->
<div class="notifications-root" id="notificationsRoot">
    <button type="button" class="notifications-toggle" id="notificationsToggle" data-i18n-aria="Open notifications" aria-expanded="false" aria-controls="notificationsPanel">
        <span class="notifications-toggle__icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </span>
        <span class="notifications-toggle__badge" id="notificationsBadge" aria-hidden="true">0</span>
    </button>
    <div class="notifications-backdrop" id="notificationsBackdrop"></div>
    <aside class="notifications-drawer" id="notificationsPanel" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="notificationsDrawerTitle">
        <div class="notifications-drawer__chrome">
            <div class="notifications-drawer__grab" aria-hidden="true">
                <span class="notifications-drawer__grab-bar"></span>
            </div>
            <div class="notifications-drawer__header">
                <h2 class="notifications-drawer__title" id="notificationsDrawerTitle" data-i18n="Notifications"></h2>
                <button type="button" class="notifications-drawer__close" id="notificationsDrawerClose" data-i18n-aria="Close notifications">&times;</button>
            </div>
            <div class="notifications-drawer__body">
                <div class="notifications-drawer__list">
                    <article class="notification-card notification-card--reminder" data-notification-id="reminder">
                        <button type="button" class="notification-card__close" data-i18n-aria="Dismiss">&times;</button>
                        <div class="notification-card__body">
                            <h4 class="notification-card__heading">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <circle cx="12" cy="12" r="10"/>
                                    <polyline points="12 6 12 12 16 14"/>
                                </svg>
                                <span data-i18n="Reminder"></span>
                            </h4>
                            <p class="notification-card__text" data-i18n="Upcoming deadlines this month"></p>
                        </div>
                    </article>
                    <article class="notification-card notification-card--feedback" data-notification-id="feedback">
                        <button type="button" class="notification-card__close" data-i18n-aria="Dismiss">&times;</button>
                        <div class="notification-card__body">
                            <h4 class="notification-card__heading">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                                </svg>
                                <span data-i18n="Feedback"></span>
                            </h4>
                            <a href="#" class="notification-card__link" data-i18n="Share your thoughts"></a>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </aside>
</div>

<script src="js/script.js"></script>

</body>
</html>
